<svg width="32" height="32" viewBox="0 0 32 32" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Deniro favicon</title>
  <desc>Deniro D monogram with checkmark</desc>

  <style>
    .icon-bg   { fill: #EEEDFE; }
    .icon-ring { stroke: #534AB7; fill: none; }
    .icon-d    { fill: #534AB7; }
    .check     { stroke: #534AB7; }
  </style>

  <rect class="icon-bg" x="0" y="0" width="32" height="32" rx="7"/>
  <circle class="icon-ring" cx="16" cy="16" r="10" stroke-width="2" stroke-dasharray="52 14" stroke-dashoffset="-3" stroke-linecap="round"/>
  <text class="icon-d" x="8" y="23" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">D</text>
  <polyline class="check" points="21,5.5 23.5,9 27,4" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
